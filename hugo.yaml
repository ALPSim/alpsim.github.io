module:
  hugoVersion:
    extended: true
    min: "0.112.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          inline:
            - - $
              - $
          block:
            - - $$
              - $$
  highlight:
    noClasses: false

params:
  description: "International collaboration for developing opensource softwares for simulation of quantum lattice models, such as quantum spin systems, electron systems, etc"
  headTitle: "ALPS - Algorithms and Libraries for Physics Simulations"
  theme:
    # light | dark | system
    default: system
    displayToggle: true
  page:
    width: normal
  editURL:
    enable: true
    base: "https://github.com/ALPSim/alpsim.github.io/edit/main/content"
  navbar:
    displayLogo: true
    displayTitle: false
    logo:
      path: logo/alps.png
      dark: logo/alps.png
      width: 48px
  footer:
    displayCopyright: true
  i18n:
    enable: true
