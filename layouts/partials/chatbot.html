{{/* ALPS Chat Assistant Widget */}}
<link rel="stylesheet" href="/css/chatbot.css">
<style>
/* Diagram blocks — inlined so they are never overridden by theme cascade */
.alps-diagram-wrap{margin:.45rem 0;border-radius:.45rem;overflow:hidden;border:1px solid rgba(0,0,0,.12)}
html.dark .alps-diagram-wrap{border-color:rgba(255,255,255,.12)}
.alps-diagram-bar{display:block;background:rgba(0,0,0,.06);padding:.2rem .5rem;font-size:.72rem;font-weight:600;color:#555;letter-spacing:.01em}
html.dark .alps-diagram-bar{background:rgba(255,255,255,.07);color:#aaa}
pre.alps-diagram{display:block!important;margin:0!important;padding:.55rem .75rem!important;background:#fafaf5!important;color:#1a1a1a!important;font-size:.75rem!important;line-height:1.65!important;font-family:ui-monospace,'SFMono-Regular',Menlo,monospace!important;white-space:pre!important;overflow-x:auto!important;max-height:300px!important;tab-size:2}
html.dark pre.alps-diagram{background:#1a1a10!important;color:#d8d8c0!important}
</style>

<div id="alps-chat-widget">
  <div id="alps-chat-window" class="alps-chat-hidden" role="dialog" aria-label="ALPS Assistant">
    <div id="alps-chat-header">
      <div id="alps-chat-header-text">
        <span>ALPS Assistant</span>
        <span id="alps-chat-subtitle">Ask me anything about ALPS</span>
      </div>
      <button id="alps-chat-close" aria-label="Close chat">&#x2715;</button>
    </div>
    <div id="alps-chat-messages" role="log" aria-live="polite" aria-atomic="false"></div>
    <div id="alps-chat-input-area">
      <input
        type="text"
        id="alps-chat-input"
        placeholder="e.g. How do I install ALPS?"
        autocomplete="off"
        maxlength="250"
        aria-label="Chat message"
      />
      <button id="alps-chat-send" aria-label="Send message">Send</button>
    </div>
  </div>

  <button id="alps-chat-toggle" aria-label="Open ALPS chat assistant" title="Ask the ALPS Assistant">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<script src="/js/chatbot.js"></script>
